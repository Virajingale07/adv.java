<!DOCTYPE html>
<html>
<head>
    <title>Student Details Form</title>
</head>
<body>
    <h2>Enter Student Details</h2>
    <form action="StudentServlet" method="POST">
        Seat No: <input type="text" name="seatNo" required><br><br>
        Name: <input type="text" name="studName" required><br><br>
        Class: <input type="text" name="className" required><br><br>
        Total Marks (out of 500): <input type="number" name="totalMarks" required><br><br>
        <input type="submit" value="Calculate Grade">
    </form>
</body>
</html>
